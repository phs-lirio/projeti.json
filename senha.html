<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f0f0f0;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #mensagem {
      margin-top: 10px;
      font-weight: bold;
    }

    #home {
      display: none;
      background: #dff0d8;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>

    <input type="text" id="usuario" placeholder="Usuário"><br>
    <input type="password" id="senha" placeholder="Senha"><br>

    <button onclick="login()">Entrar</button>

    <div id="mensagem"></div>
  </div>

  <!-- HOME -->
  <div id="home">
    <h1>Bem-vindo!</h1>
    <p>Você fez login com sucesso 👍</p>

    <button onclick="voltar()">Sair</button>
  </div>

  <script>
    function login() {
      const usuario = document.getElementById("usuario").value;
      const senha = document.getElementById("senha").value;

      const usuarioCorreto = "pedro";
      const senhaCorreta = "0304";

      if (usuario === usuarioCorreto && senha === senhaCorreta) {
        // troca de tela
        document.getElementById("login").style.display = "none";
        document.getElementById("home").style.display = "block";
      } else {
        document.getElementById("mensagem").style.color = "red";
        document.getElementById("mensagem").innerText = "Usuário ou senha incorretos!";
      }
    }

    function voltar() {
      document.getElementById("home").style.display = "none";
      document.getElementById("login").style.display = "block";
    }
  </script>

</body>
</html>
